<!DOCTYPE html>
<html>
<head>
    <title>Fox Clicker Game</title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; }
        #fox { width: 100px; cursor: pointer; }
        #score { font-size: 24px; }
    </style>
</head>
<body>
    <h1>Fox Clicker Game</h1>
    <img id="fox" src="https://example.com/fox.png" alt="Click the Fox!" onclick="incrementScore()">
    <p id="score">Score: 0</p>
    <script>
        let score = 0;
        function incrementScore() {
            score++;
            document.getElementById('score').innerText = 'Score: ' + score;
        }
    </script>
</body>
</html>
