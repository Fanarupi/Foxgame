<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fox Clicker Game</title>
    <link rel="stylesheet" href="style.css">
    <script src="game.js" defer></script>
</head>
<body>
    <h1>Fox Clicker Game</h1>
    <div id="game-area">
        <div id="fox">
            <img src="fox.png" alt="Fox" id="fox-img">
            <button id="click-btn">Click me!</button>
        </div>
        <div id="stats">
            <p>Clicks: <span id="clicks">0</span></p>
            <p>Prestige Points: <span id="prestige-points">0</span></p>
        </div>
        <div id="upgrades">
            <h2>Upgrades</h2>
            <button id="upgrade-1">Upgrade 1 (100 clicks)</button>
            <button id="upgrade-2">Upgrade 2 (500 clicks)</button>
        </div>
        <div id="achievements">
            <h2>Achievements</h2>
            <ul id="achievement-list"></ul>
        </div>
        <div id="particles"></div>
    </div>
    <script>
        let clicks = 0;
        let prestigePoints = 0;

        document.getElementById('click-btn').onclick = function() {
            clicks++;
            document.getElementById('clicks').innerText = clicks;
            // Handle particle effects
        };

        // Upgrade and Prestige Logic Here
    </script>
</body>
</html>
